name: Collect and deploy

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      group:
        description: "Force a specific group (or 'all'). Empty = slot-based auto."
        required: false
        default: ""

concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Determine due groups
        id: due
        run: |
          INPUT="${{ github.event.inputs.group }}"
          if [ "$INPUT" = "all" ]; then
            echo "groups=30min 2hours 6hours daily_9am" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT" ]; then
            echo "groups=$INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "groups=$(python ci_groups.py)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run collectors
        if: steps.due.outputs.groups != ''
        env:
          TAIWAN_ALERT_SLACK_WEBHOOK: ${{ secrets.TAIWAN_ALERT_SLACK_WEBHOOK }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          APIFY_MAX_CHARGE_USD: "0.50"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_RADAR_TOKEN }}
          NOTAM_API_URL: ${{ secrets.NOTAM_API_URL }}
          NOTAM_API_TOKEN: ${{ secrets.NOTAM_API_TOKEN }}
          TAIWAN_ALERT_THRESHOLD: ${{ vars.TAIWAN_ALERT_THRESHOLD || '2' }}
        run: |
          for g in ${{ steps.due.outputs.groups }}; do
            echo "::group::collect --group $g"
            python collect.py --group "$g"
            echo "::endgroup::"
          done

      - name: Commit and push state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json web/state.json data/group_runs.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "state: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Deploy web/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_PAGES_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web --project-name=taiwan-alert --branch=main --commit-dirty=true

      - name: Dispatch Slack alerts
        env:
          TAIWAN_ALERT_SLACK_WEBHOOK: ${{ secrets.TAIWAN_ALERT_SLACK_WEBHOOK }}
          TAIWAN_ALERT_TEST_MODE: ${{ vars.TAIWAN_ALERT_TEST_MODE || 'false' }}
        run: python collect.py --dispatch-alerts

      - name: Commit alert watermark if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json web/state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No watermark update."
          else
            git commit -m "alert: watermark $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
